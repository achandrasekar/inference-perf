apiVersion: batch/v1
kind: Job
metadata:
  name: guidellm-bench-5000qps
spec:
  template:
    spec:
      containers:
      - name: guidellm-bench
        image: guidellm-bench:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: hf_api_token
        - name: GUIDELLM__MAX_WORKER_PROCESSES
          value: "144"
        args:
        - "benchmark"
        - "--target"
        - "http://vllm-llama3-8b-instruct-svc:8000"
        - "--profile"
        - "concurrent"
        - "--rate"
        - "5000"
        - "--max-seconds"
        - "300"
        - "--data"
        - "prompt_tokens=320,output_tokens=200"
      restartPolicy: Never
  backoffLimit: 4
